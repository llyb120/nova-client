name: CI

on:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows
            os: windows-latest
          - name: macos
            os: macos-latest

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use crates.io (skip China mirror on GitHub runners)
        shell: bash
        run: |
          mkdir -p .cargo
          printf '%s\n' '[net]' 'git-fetch-with-cli = true' > .cargo/config.toml

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend deps
        run: npm ci

      - name: Typecheck
        run: npm run check

      - name: Build (Windows binary)
        if: runner.os == 'Windows'
        run: npx tauri build --no-bundle

      - name: Build (macOS app + DMG)
        if: runner.os == 'macOS'
        run: npx tauri build --bundles dmg

      - name: Upload Windows binary
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: Nova-windows-x64
          path: src-tauri/target/release/Nova.exe
          if-no-files-found: error

      - name: Upload macOS DMG
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: Nova-macos-dmg
          path: src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error

      - name: Upload macOS app binary
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: Nova-macos-binary
          path: src-tauri/target/release/Nova
          if-no-files-found: error

name: Release

# push 到 master → 自动 patch+1 → 构建 → 发 GitHub Release → 版本号写回仓库
# 构建失败不会写回版本号，不会跳号。

on:
  push:
    branches: [master, main]

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Compute next version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute next version (patch +1)
        id: ver
        shell: bash
        run: |
          set -euo pipefail
          CUR=$(python3 -c "import json; print(json.load(open('src-tauri/tauri.conf.json'))['version'])")
          IFS=. read -r A B C <<< "$CUR"
          A=${A:-0}; B=${B:-0}; C=${C:-0}
          NEW="${A}.${B}.$((C+1))"
          echo "current=$CUR -> $NEW"
          echo "version=$NEW" >> "$GITHUB_OUTPUT"

  build:
    name: Build (${{ matrix.name }})
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows
            os: windows-latest
          - name: macos
            os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Use crates.io (skip China mirror on GitHub runners)
        shell: bash
        run: |
          mkdir -p .cargo
          printf '%s\n' '[net]' 'git-fetch-with-cli = true' > .cargo/config.toml

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - run: npm ci
      - run: npm run check

      - name: Write version into config files
        shell: bash
        run: |
          VER="${{ needs.prepare.outputs.version }}"
          python3 scripts/package.py --version "$VER" --bump-only

      - name: Build (Windows binary)
        if: runner.os == 'Windows'
        run: npx tauri build --no-bundle

      - name: Build (macOS app + DMG)
        if: runner.os == 'macOS'
        run: npx tauri build --bundles dmg

      - name: Package update zip
        shell: bash
        run: |
          VER="${{ needs.prepare.outputs.version }}"
          python3 scripts/package.py --version "$VER" --no-build

      - name: Upload update zip
        uses: actions/upload-artifact@v4
        with:
          name: update-zip-${{ matrix.name }}
          path: release/*.zip
          if-no-files-found: error

      - name: Upload macOS DMG
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: Nova-macos-dmg-v${{ needs.prepare.outputs.version }}
          path: src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error

  release:
    name: Write back version & publish Release
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Write version & commit & push & tag
        shell: bash
        run: |
          set -euo pipefail
          VER="${{ needs.prepare.outputs.version }}"
          python3 scripts/package.py --version "$VER" --bump-only
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src-tauri/tauri.conf.json package.json
          if git diff --staged --quiet; then
            echo "版本已是 v${VER}，无需提交"
          else
            git commit -m "chore: release v${VER} [skip ci]"
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi
          git tag -f "v${VER}"
          git push origin "v${VER}" -f

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.prepare.outputs.version }}
          name: Nova v${{ needs.prepare.outputs.version }}
          target_commitish: ${{ github.ref }}
          generate_release_notes: true
          files: |
            dist/**/*.zip
            dist/**/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Keep only the 10 most recent releases
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # 按 createdAt 升序，取除最新 10 个之外的所有 release（含 draft/prerelease）
          mapfile -t TO_DELETE < <(gh release list --limit 100 \
            --json createdAt,tagName \
            --jq 'sort_by(.createdAt) | .[:-10] | .[].tagName')
          if [ ${#TO_DELETE[@]} -eq 0 ]; then
            echo "无需清理（release 数量 ≤ 10）"
            exit 0
          fi
          for tag in "${TO_DELETE[@]}"; do
            echo "删除旧 release: $tag"
            gh release delete "$tag" --cleanup-tag -y || echo "警告：删除 $tag 失败"
          done
